
services:
  api:
    build: .
    container_name: accesslens-api
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DEBUG=false
      - DATABASE_URL=sqlite:///app/data/accesslens.db
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_PATH=/app/data
      - LOG_LEVEL=INFO
      - JSON_LOGS=true
      - CORS_ORIGINS=http://localhost:3000,http://localhost:8000
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - accesslens-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: accesslens-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - accesslens-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  accesslens-network:
    driver: bridge

volumes:
  redis-data: