<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AccessLens Core | 7-Layer Analysis Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --text: #e0e0e0;
            --accent: #00f2ff;
            --accent-dim: rgba(0, 242, 255, 0.1);
            --success: #00ff9d;
            --danger: #ff0055;
            --panel-bg: rgba(10, 10, 10, 0.8);
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 50% 50%, #111 0%, transparent 100%),
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }

        .scanline {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(0, 242, 255, 0.1);
            z-index: 10;
            animation: scan 4s linear infinite;
        }

        .hud-container {
            border: 1px solid var(--accent-dim);
            padding: 3.5rem;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border-radius: 4px;
            box-shadow: 0 0 80px rgba(0, 242, 255, 0.05);
            max-width: 650px;
            width: 90%;
            text-align: center;
            position: relative;
            animation: fadeIn 1s ease-out;
        }

        /* HUD Corners */
        .corner {
            position: absolute;
            width: 30px; height: 30px;
            border: 2px solid var(--accent);
        }
        .tl { top: -2px; left: -2px; border-right: 0; border-bottom: 0; }
        .tr { top: -2px; right: -2px; border-left: 0; border-bottom: 0; }
        .bl { bottom: -2px; left: -2px; border-right: 0; border-top: 0; }
        .br { bottom: -2px; right: -2px; border-left: 0; border-top: 0; }

        h1 {
            font-size: 2.8rem;
            letter-spacing: 0.3rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }

        .tagline {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--accent);
            opacity: 0.7;
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.15rem;
            color: var(--success);
            background: rgba(0, 255, 157, 0.08);
            padding: 0.6rem 1.4rem;
            border-radius: 2px;
            border: 1px solid rgba(0, 255, 157, 0.2);
            margin-bottom: 2.5rem;
        }

        .pulse-dot {
            width: 10px; height: 10px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--success);
            animation: pulse 1.5s infinite;
        }

        .engine-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
            text-align: left;
            margin-bottom: 3rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .data-point {
            border-left: 2px solid var(--accent);
            padding-left: 1.2rem;
            position: relative;
        }

        .data-point::after {
            content: '';
            position: absolute;
            left: -2px; top: 0; height: 4px; width: 4px;
            background: #fff;
        }

        .dp-label {
            font-size: 0.65rem;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 0.3rem;
        }

        .dp-value {
            font-size: 0.95rem;
            color: #fff;
            font-weight: 400;
        }

        .nav-links {
            display: flex;
            gap: 1.2rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            color: #fff;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 0.8rem 1.8rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.02);
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 242, 255, 0.1);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }

        .btn:hover::before { left: 100%; }

        @keyframes scan {
            from { top: -5%; }
            to { top: 105%; }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.6; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @media (max-width: 500px) {
            .engine-grid { grid-template-columns: 1fr; }
            h1 { font-size: 2rem; }
            .hud-container { padding: 2rem; }
        }
    </style>
</head>
<body>
    <div class="scanline"></div>

    <div class="hud-container">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>

        <h1>AccessLens</h1>
        <div class="tagline">Multimodal Accessibility Intelligence Core</div>
        
        <div class="status-badge">
            <div class="pulse-dot"></div> System Operational
        </div>

        <div class="engine-grid">
            <div class="data-point">
                <div class="dp-label">Analysis Pipeline</div>
                <div class="dp-value">7 Modular Layers</div>
            </div>
            <div class="data-point">
                <div class="dp-label">Persistence Tier</div>
                <div class="dp-value">SQLite / Edge Native</div>
            </div>
            <div class="data-point">
                <div class="dp-label">Collection SDK</div>
                <div class="dp-value">Chromium Host</div>
            </div>
            <div class="data-point">
                <div class="dp-label">Node Status</div>
                <div class="dp-value">Hugging Face Cluster</div>
            </div>
        </div>

        <div class="nav-links">
            <a href="/docs" class="btn">Swagger Documentation</a>
            <a href="/health" class="btn">Health Diagnostics</a>
            <a href="/metrics" class="btn">Live Metrics</a>
        </div>
    </div>
</body>
</html>
